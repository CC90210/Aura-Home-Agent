<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AURA — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0A0A14;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      border-radius: 20px;
      background: linear-gradient(135deg, #7C3AED, #3B82F6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 700;
      color: white;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    p {
      color: #94a3b8;
      font-size: 0.9rem;
      max-width: 300px;
      line-height: 1.5;
    }
    .pulse {
      width: 12px;
      height: 12px;
      background: #EF4444;
      border-radius: 50%;
      margin: 1.5rem auto 0.5rem;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.2); }
    }
    .status { color: #EF4444; font-size: 0.8rem; font-weight: 500; }
    button {
      margin-top: 2rem;
      padding: 0.75rem 1.5rem;
      background: #7C3AED;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
    }
    button:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">A</div>
    <h1>AURA is Offline</h1>
    <p>Cannot reach Home Assistant. Check that your Pi is powered on and connected to the network.</p>
    <div class="pulse"></div>
    <div class="status">No Connection</div>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
