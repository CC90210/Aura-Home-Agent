<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#0A0A14"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#g1)" stroke-width="12" opacity="0.6"/>
  <!-- Inner orbital rings -->
  <ellipse cx="256" cy="256" rx="140" ry="80" fill="none" stroke="url(#g2)" stroke-width="8" transform="rotate(-30 256 256)" filter="url(#glow)" opacity="0.7"/>
  <ellipse cx="256" cy="256" rx="140" ry="80" fill="none" stroke="url(#g1)" stroke-width="8" transform="rotate(30 256 256)" filter="url(#glow)" opacity="0.7"/>
  <ellipse cx="256" cy="256" rx="140" ry="80" fill="none" stroke="url(#g2)" stroke-width="6" transform="rotate(90 256 256)" filter="url(#glow)" opacity="0.5"/>
  <!-- Center A letter -->
  <text x="256" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="180" fill="url(#g1)" filter="url(#glow)">A</text>
  <!-- Center glow dot -->
  <circle cx="256" cy="180" r="8" fill="#60A5FA" opacity="0.9">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
