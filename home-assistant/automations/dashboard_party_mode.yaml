- alias: "Dashboard Party Mode"
  description: "Party mode triggered from dashboard or voice webhook."
  trigger:
    - platform: webhook
      webhook_id: aura_party_mode
      allowed_methods:
        - POST
      local_only: false
  condition: []
  action:
    - service: scene.turn_on
      target:
        entity_id: scene.aura_party_mode
      continue_on_error: true
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.party_mode_active
      continue_on_error: true
    - service: media_player.volume_set
      target:
        entity_id: media_player.living_room_speaker
      data:
        volume_level: 0.75
      continue_on_error: true
  mode: single
