alias: "AURA - Double Clap: Toggle Welcome Home"
description: >
  Triggered by a double-clap webhook from the clap_listener.py service on the
  Pi. Toggles the Welcome Home scene — living room LEDs warm amber at 70% and
  bedroom LEDs soft warm at 40%. Uses input_boolean.welcome_home_active to track
  toggle state so repeated claps alternate on/off.

trigger:
  - platform: webhook
    webhook_id: aura_double_clap
    allowed_methods:
      - POST
    local_only: true

condition: []

action:
  - choose:
      # --- BRANCH 1: Scene is currently OFF → turn it ON ---
      - conditions:
          - condition: state
            entity_id: input_boolean.welcome_home_active
            state: "off"
        sequence:
          - service: light.turn_on
            target:
              entity_id: light.living_room_leds
            data:
              rgb_color: [255, 180, 100]
              brightness_pct: 70
              transition: 1
            continue_on_error: true

          - service: light.turn_on
            target:
              entity_id: light.bedroom_leds
            data:
              rgb_color: [255, 200, 150]
              brightness_pct: 40
              transition: 1
            continue_on_error: true

          - service: input_boolean.turn_on
            target:
              entity_id: input_boolean.welcome_home_active
            continue_on_error: true

      # --- BRANCH 2: Scene is currently ON → turn it OFF ---
      - conditions:
          - condition: state
            entity_id: input_boolean.welcome_home_active
            state: "on"
        sequence:
          - service: light.turn_off
            target:
              entity_id:
                - light.living_room_leds
                - light.bedroom_leds
            data:
              transition: 2
            continue_on_error: true

          - service: input_boolean.turn_off
            target:
              entity_id: input_boolean.welcome_home_active
            continue_on_error: true

mode: single
max_exceeded: silent
