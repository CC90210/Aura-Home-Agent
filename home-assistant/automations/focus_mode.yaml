alias: "AURA - Focus Mode"
description: >
  Triggered by the aura_focus_mode webhook. Optimises the space for deep,
  distraction-free work. Cool daylight 5000K at 80% across all work-area lights
  — clinically proven to promote alertness. Lo-fi or ambient playlist starts at
  15% volume: present enough to mask background noise, quiet enough not to
  compete with thinking. Do-not-disturb flag set so non-critical notification
  automations stand down. Accent LEDs and bedroom lights off to reduce peripheral
  distraction. Designed for Conaugh and Adon's focused work and creative writing
  sessions.

trigger:
  - platform: webhook
    webhook_id: aura_focus_mode
    allowed_methods:
      - POST
    local_only: false

condition: []

action:
  # Overhead: cool daylight 5000K at 80% — maximises alertness
  - service: light.turn_on
    target:
      entity_id: light.overhead
    data:
      color_temp_kelvin: 5000
      brightness_pct: 80
      transition: 3
    continue_on_error: true

  # Key light: matching daylight temperature at 80%
  - service: light.turn_on
    target:
      entity_id: light.key_light
    data:
      color_temp_kelvin: 5000
      brightness_pct: 80
      transition: 3
    continue_on_error: true

  # Desk accent: cool white to keep the work zone bright and cohesive
  - service: light.turn_on
    target:
      entity_id: light.desk_accent
    data:
      color_temp_kelvin: 5000
      brightness_pct: 60
      transition: 3
    continue_on_error: true

  # LED strips off — coloured reactive lights are a distraction during focus
  - service: light.turn_off
    target:
      entity_id:
        - light.living_room_leds
        - light.bedroom_leds
        - light.tv_backlight_leds
    data:
      transition: 3
    continue_on_error: true

  # Speaker: lo-fi / ambient playlist at 15% — enough to mask noise
  - service: media_player.volume_set
    target:
      entity_id: media_player.living_room_speaker
    data:
      volume_level: 0.15
    continue_on_error: true

  - service: media_player.play_media
    target:
      entity_id: media_player.living_room_speaker
    data:
      # Replace with preferred lo-fi / ambient Spotify playlist URI
      media_content_id: "spotify:playlist:37i9dQZF1DWWQRwui0ExPn"
      media_content_type: music
    continue_on_error: true

  # Do not disturb: suppress non-critical notification automations
  - service: input_boolean.turn_on
    target:
      entity_id: input_boolean.do_not_disturb
    continue_on_error: true

  # Mark focus mode active
  - service: input_boolean.turn_on
    target:
      entity_id: input_boolean.focus_mode_active
    continue_on_error: true

mode: single
max_exceeded: silent
