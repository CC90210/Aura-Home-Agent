alias: "AURA - Gaming Mode"
description: >
  Triggered by the aura_gaming_mode webhook. Sets the TV backlight LEDs to a
  dynamic reactive color effect for immersion, dims all other lights to 10% so
  screens are easy to read without total darkness, and sets the speaker to a
  gaming-friendly 50% volume. Designed for Conaugh and Adon's gaming sessions.

trigger:
  - platform: webhook
    webhook_id: aura_gaming_mode
    allowed_methods:
      - POST
    local_only: false

condition: []

action:
  # TV backlight LEDs: dynamic colorloop effect for reactive ambiance behind screen
  - service: light.turn_on
    target:
      entity_id: light.tv_backlight_leds
    data:
      effect: "colorloop"
      brightness_pct: 80
      transition: 2
    continue_on_error: true

  # Living room LEDs: dim to 10% — enough ambient fill without screen glare
  - service: light.turn_on
    target:
      entity_id: light.living_room_leds
    data:
      rgb_color: [20, 10, 60]
      brightness_pct: 10
      transition: 2
    continue_on_error: true

  # Bedroom LEDs: dim to 10%
  - service: light.turn_on
    target:
      entity_id: light.bedroom_leds
    data:
      rgb_color: [20, 10, 60]
      brightness_pct: 10
      transition: 2
    continue_on_error: true

  # Desk accent: dim to 10%
  - service: light.turn_on
    target:
      entity_id: light.desk_accent
    data:
      rgb_color: [20, 10, 60]
      brightness_pct: 10
      transition: 2
    continue_on_error: true

  # Key light and overheads off — they wash out screens
  - service: light.turn_off
    target:
      entity_id:
        - light.overhead
        - light.key_light
    data:
      transition: 2
    continue_on_error: true

  # Speaker: 50% volume for game audio
  - service: media_player.volume_set
    target:
      entity_id: media_player.living_room_speaker
    data:
      volume_level: 0.50
    continue_on_error: true

  # Mark gaming mode active for tracking
  - service: input_boolean.turn_on
    target:
      entity_id: input_boolean.gaming_mode_active
    continue_on_error: true

mode: single
max_exceeded: silent
