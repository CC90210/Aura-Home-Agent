- alias: "Open Up Protocol"
  description: "Morning startup — lights on, blinds open, comfortable temperature, morning music. Triggered from dashboard or voice."
  trigger:
    - platform: webhook
      webhook_id: aura_open_up
      allowed_methods:
        - POST
      local_only: false
  condition: []
  action:
    - service: light.turn_on
      target:
        entity_id:
          - light.living_room_leds
          - light.bedroom_leds
          - light.overhead
      data:
        brightness_pct: 60
        color_temp_kelvin: 3000
      continue_on_error: true
    - service: cover.open_cover
      target:
        entity_id: cover.living_room_blinds
      continue_on_error: true
    - service: climate.set_temperature
      target:
        entity_id: climate.thermostat
      data:
        temperature: 21
        hvac_mode: heat
      continue_on_error: true
    - service: media_player.volume_set
      target:
        entity_id: media_player.living_room_speaker
      data:
        volume_level: 0.25
      continue_on_error: true
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.goodnight_active
      continue_on_error: true
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.welcome_home_active
      continue_on_error: true
  mode: single
