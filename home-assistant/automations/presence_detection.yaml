alias: "AURA - Presence Detection: Welcome Home"
description: >
  Fires when a tracked person entity transitions to 'home'. Guards against
  false triggers from brief departures (e.g., taking out the trash) by
  checking that the person has been 'not_home' for at least 30 minutes before
  activating the Welcome Home scene. Works with any person.* entity tracked
  via the HA Companion app, a WiFi device tracker, or a BT beacon.

trigger:
  # Trigger on either person arriving — add more triggers as needed for
  # additional household members.
  - platform: state
    entity_id: person.cc
    to: "home"
    id: cc_arrived

  - platform: state
    entity_id: person.roommate
    to: "home"
    id: roommate_arrived

condition:
  # Only activate if the person was away for at least 30 minutes.
  # `for` on the *from* state is evaluated via the trigger's `from_state`
  # duration — we use a template condition to check elapsed time since last
  # 'not_home' period exceeded 30 min. The simplest approach in HA is to
  # check that the state was 'not_home' for >= 30 min before the transition,
  # which we do by confirming the previous state duration.
  - condition: template
    value_template: >
      {{ trigger.from_state.state == 'not_home'
         and (now() - trigger.from_state.last_changed).total_seconds() >= 1800 }}

action:
  # Activate the Welcome Home scene
  - service: scene.turn_on
    target:
      entity_id: scene.welcome_home
    data:
      transition: 2
    continue_on_error: true

  # Mark the welcome home boolean as active so double-clap toggle knows state
  - service: input_boolean.turn_on
    target:
      entity_id: input_boolean.welcome_home_active
    continue_on_error: true

  # Optionally start the welcome home playlist at a comfortable volume
  - service: media_player.volume_set
    target:
      entity_id: media_player.living_room_speaker
    data:
      volume_level: 0.30
    continue_on_error: true

  - service: media_player.play_media
    target:
      entity_id: media_player.living_room_speaker
    data:
      # Replace with your actual Spotify playlist URI
      media_content_id: "spotify:playlist:37i9dQZF1DX3rxVfibe1L0"
      media_content_type: music
    continue_on_error: true

mode: parallel
max: 2
