alias: "AURA - Routine: Evening Wind Down"
description: >
  Three-stage nightly wind-down for Conaugh and Adon (bed by midnight on
  weekdays). At 10:00 PM lights shift to warm 2200K at 40% and music drops
  to 20%. At 11:00 PM lights dim further to 20% with a check-in. At 11:30 PM
  lights reach near-dark at 10%. At midnight AURA prompts the goodnight
  protocol. Each stage fires independently so missing one doesn't break
  the sequence.

trigger:
  - platform: time
    at: "22:00:00"
    id: wind_down_start

  - platform: time
    at: "23:00:00"
    id: wind_down_mid

  - platform: time
    at: "23:30:00"
    id: wind_down_dim

  - platform: time
    at: "00:00:00"
    id: wind_down_goodnight_prompt

condition:
  # At least one person home — no point running if the apartment is empty
  - condition: or
    conditions:
      - condition: state
        entity_id: person.conaugh
        state: "home"
      - condition: state
        entity_id: person.adon
        state: "home"

action:
  - choose:
      # ── 9:00 PM: Shift to warm, lower volume, set sleep thermostat ───────────
      - conditions:
          - condition: trigger
            id: wind_down_start
        sequence:
          - service: light.turn_on
            target:
              entity_id:
                - light.living_room_leds
                - light.bedroom_leds
                - light.overhead
            data:
              color_temp_kelvin: 2200
              brightness_pct: 40
              transition: 120
            continue_on_error: true

          # Lower music volume to wind-down level
          - service: media_player.volume_set
            target:
              entity_id: media_player.living_room_speaker
            data:
              volume_level: 0.20
            continue_on_error: true

          # Pre-set thermostat to sleep temperature so the bedroom is ready
          - service: climate.set_temperature
            target:
              entity_id: climate.thermostat
            data:
              temperature: 19
              hvac_mode: heat
            continue_on_error: true

          # Turn off work-mode lights that shouldn't carry into the evening
          - service: light.turn_off
            target:
              entity_id:
                - light.desk_accent
                - light.key_light
            data:
              transition: 30
            continue_on_error: true

      # ── 10:00 PM: Dim further + check-in voice prompt ────────────────────────
      - conditions:
          - condition: trigger
            id: wind_down_mid
        sequence:
          - service: light.turn_on
            target:
              entity_id:
                - light.living_room_leds
                - light.bedroom_leds
                - light.overhead
            data:
              color_temp_kelvin: 2200
              brightness_pct: 20
              transition: 120
            continue_on_error: true

          - service: rest_command.aura_webhook
            data:
              webhook_id: aura_voice_prompt
              payload: >
                {
                  "message": "Hour to bedtime. Wrapping up?",
                  "priority": "low"
                }
            continue_on_error: true

      # ── 10:30 PM: Near-dark ──────────────────────────────────────────────────
      - conditions:
          - condition: trigger
            id: wind_down_dim
        sequence:
          - service: light.turn_on
            target:
              entity_id:
                - light.living_room_leds
                - light.bedroom_leds
                - light.overhead
            data:
              color_temp_kelvin: 2000
              brightness_pct: 10
              transition: 120
            continue_on_error: true

          # Drop music to barely audible
          - service: media_player.volume_set
            target:
              entity_id: media_player.living_room_speaker
            data:
              volume_level: 0.10
            continue_on_error: true

      # ── 11:00 PM: Prompt goodnight protocol ─────────────────────────────────
      - conditions:
          - condition: trigger
            id: wind_down_goodnight_prompt
        sequence:
          - service: rest_command.aura_webhook
            data:
              webhook_id: aura_voice_prompt
              payload: >
                {
                  "message": "Alright, calling it. Starting goodnight in one minute.",
                  "priority": "normal"
                }
            continue_on_error: true

          # Brief pause so the voice message can play before lights go out
          - delay:
              seconds: 60

          # Trigger the full goodnight automation
          - service: rest_command.aura_webhook
            data:
              webhook_id: aura_goodnight
              payload: '{"source": "evening_wind_down"}'
            continue_on_error: true

mode: single
max_exceeded: silent
