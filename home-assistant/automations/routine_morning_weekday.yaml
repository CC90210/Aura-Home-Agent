alias: "AURA - Routine: Weekday Morning (Conaugh & Adon)"
description: >
  Five-phase weekday morning routine for Conaugh and Adon. Starts at 7:00 AM
  with a gentle sunrise simulation, escalates every 10-15 minutes to full
  energy lighting by 8:00 AM with a gym reminder. Both residents typically
  wake between 7-8 AM on weekdays and go to bed around midnight.
  Only runs when at least one person is home.

trigger:
  # Phase 1 — very gentle sunrise start
  - platform: time
    at: "07:00:00"
    id: phase_1

  # Phase 2 — step up
  - platform: time
    at: "07:10:00"
    id: phase_2

  # Phase 3 — coffee and music
  - platform: time
    at: "07:20:00"
    id: phase_3

  # Phase 4 — energy ramp
  - platform: time
    at: "07:35:00"
    id: phase_4

  # Phase 5 — full brightness, gym callout
  - platform: time
    at: "07:50:00"
    id: phase_5

condition:
  # Weekdays only
  - condition: time
    weekday:
      - mon
      - tue
      - wed
      - thu
      - fri

  # At least one person must be home
  - condition: or
    conditions:
      - condition: state
        entity_id: person.conaugh
        state: "home"
      - condition: state
        entity_id: person.adon
        state: "home"

action:
  - choose:
      # ── Phase 1 (6:15): Near-black warm glow — sunrise simulation start ──────
      - conditions:
          - condition: trigger
            id: phase_1
        sequence:
          - service: light.turn_on
            target:
              entity_id:
                - light.bedroom_leds
                - light.living_room_leds
            data:
              rgb_color:
                - 255
                - 100
                - 20
              brightness_pct: 5
              transition: 60
            continue_on_error: true

      # ── Phase 2 (6:25): Slightly brighter, still sunrise amber ───────────────
      - conditions:
          - condition: trigger
            id: phase_2
        sequence:
          - service: light.turn_on
            target:
              entity_id:
                - light.bedroom_leds
                - light.living_room_leds
            data:
              color_temp_kelvin: 2700
              brightness_pct: 20
              transition: 120
            continue_on_error: true

      # ── Phase 3 (6:30): Comfortable warm white — coffee + playlist ───────────
      - conditions:
          - condition: trigger
            id: phase_3
        sequence:
          - service: light.turn_on
            target:
              entity_id:
                - light.bedroom_leds
                - light.living_room_leds
                - light.overhead
            data:
              color_temp_kelvin: 2700
              brightness_pct: 50
              transition: 60
            continue_on_error: true

          # Morning playlist at low volume — starts in bedroom where you wake up
          - service: media_player.volume_set
            target:
              entity_id: media_player.bedroom_speaker
            data:
              volume_level: 0.18
            continue_on_error: true

          - service: media_player.play_media
            target:
              entity_id: media_player.bedroom_speaker
            data:
              # Morning energy playlist — replace URI with preferred playlist
              media_content_id: "spotify:playlist:37i9dQZF1DX6ALfRKlHn1t"
              media_content_type: music
            continue_on_error: true

      # ── Phase 4 (6:45): Cooler, brighter — "time to move" energy ─────────────
      - conditions:
          - condition: trigger
            id: phase_4
        sequence:
          - service: light.turn_on
            target:
              entity_id:
                - light.bedroom_leds
                - light.living_room_leds
                - light.overhead
            data:
              color_temp_kelvin: 4000
              brightness_pct: 70
              transition: 60
            continue_on_error: true

          # Nudge volume up so the music carries a bit more
          - service: media_player.volume_set
            target:
              entity_id: media_player.living_room_speaker
            data:
              volume_level: 0.28
            continue_on_error: true

      # ── Phase 5 (7:00): Full brightness + gym voice callout ──────────────────
      - conditions:
          - condition: trigger
            id: phase_5
        sequence:
          - service: light.turn_on
            target:
              entity_id:
                - light.bedroom_leds
                - light.living_room_leds
                - light.overhead
            data:
              color_temp_kelvin: 4500
              brightness_pct: 100
              transition: 30
            continue_on_error: true

mode: single
max_exceeded: silent
