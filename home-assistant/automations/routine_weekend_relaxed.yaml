alias: "AURA - Routine: Weekend Relaxed Morning"
description: >
  Weekend version of the morning routine for Conaugh and Adon. Starts at 8:00 AM
  with a slower, more leisurely sunrise simulation — longer transitions, warmer
  tones, no urgency. Plays a "weekend vibes" playlist instead of the energetic
  weekday morning playlist. Gym reminders are suppressed by default; they can be
  re-enabled by turning on input_boolean.weekend_gym_reminder in the HA dashboard
  or via voice command. Only fires on Saturday and Sunday.

trigger:
  # Phase 1 — gentle sunrise start
  - platform: time
    at: "08:00:00"
    id: weekend_phase_1

  # Phase 2 — warmly lit, coffee
  - platform: time
    at: "08:20:00"
    id: weekend_phase_2

  # Phase 3 — comfortable ambient, fully awake
  - platform: time
    at: "08:45:00"
    id: weekend_phase_3

  # Optional gym reminder — only fires if input_boolean.weekend_gym_reminder is on
  - platform: time
    at: "09:15:00"
    id: weekend_gym_optional

condition:
  # Weekends only
  - condition: time
    weekday:
      - sat
      - sun

  # At least one person home
  - condition: or
    conditions:
      - condition: state
        entity_id: person.conaugh
        state: "home"
      - condition: state
        entity_id: person.adon
        state: "home"

action:
  - choose:
      # ── Phase 1 (8:00): Very slow, warm sunrise simulation ───────────────────
      - conditions:
          - condition: trigger
            id: weekend_phase_1
        sequence:
          # Even softer start than weekdays — this is a weekend, not a drill
          - service: light.turn_on
            target:
              entity_id:
                - light.bedroom_leds
                - light.living_room_leds
            data:
              rgb_color:
                - 255
                - 120
                - 30
              brightness_pct: 5
              # 3-minute slow fade — very gradual
              transition: 180
            continue_on_error: true

      # ── Phase 2 (8:20): Warmer ambient + coffee + weekend playlist ────────────
      - conditions:
          - condition: trigger
            id: weekend_phase_2
        sequence:
          - service: light.turn_on
            target:
              entity_id:
                - light.bedroom_leds
                - light.living_room_leds
                - light.overhead
            data:
              color_temp_kelvin: 2700
              brightness_pct: 40
              transition: 120
            continue_on_error: true

          # Coffee maker on — same as weekdays, weekends deserve coffee too
          - service: switch.turn_on
            target:
              entity_id: switch.coffee_maker
            continue_on_error: true

          # Weekend vibes playlist — chill, no rush
          - service: media_player.volume_set
            target:
              entity_id: media_player.living_room_speaker
            data:
              volume_level: 0.22
            continue_on_error: true

          - service: media_player.play_media
            target:
              entity_id: media_player.living_room_speaker
            data:
              # Weekend chill playlist — replace URI with preferred playlist
              media_content_id: "spotify:playlist:37i9dQZF1DX4WYpdgoIcn6"
              media_content_type: music
            continue_on_error: true

      # ── Phase 3 (8:45): Full comfortable ambient — no urgency ─────────────────
      - conditions:
          - condition: trigger
            id: weekend_phase_3
        sequence:
          - service: light.turn_on
            target:
              entity_id:
                - light.bedroom_leds
                - light.living_room_leds
                - light.overhead
            data:
              color_temp_kelvin: 3000
              brightness_pct: 60
              transition: 120
            continue_on_error: true

      # ── Optional gym reminder (9:15): Only if input_boolean is on ─────────────
      # Enable via HA dashboard or voice: "Hey AURA, remind me about the gym this weekend"
      - conditions:
          - condition: trigger
            id: weekend_gym_optional
          - condition: state
            entity_id: input_boolean.weekend_gym_reminder
            state: "on"
          # Only remind if still home
          - condition: or
            conditions:
              - condition: state
                entity_id: person.conaugh
                state: "home"
              - condition: state
                entity_id: person.adon
                state: "home"

        sequence:
          - service: rest_command.aura_webhook
            data:
              webhook_id: aura_voice_prompt
              payload: >
                {
                  "message": "Weekend gym reminder — you asked me to tell you. No pressure, but also yes pressure.",
                  "priority": "low"
                }
            continue_on_error: true

          # Auto-reset so it doesn't fire next weekend automatically — they opt in each time
          - service: input_boolean.turn_off
            target:
              entity_id: input_boolean.weekend_gym_reminder
            continue_on_error: true

mode: single
max_exceeded: silent
