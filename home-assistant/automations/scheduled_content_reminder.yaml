alias: "AURA - Scheduled: Content Creation Window Open (9 AM Weekdays)"
description: >
  At 9:00 AM on weekdays, fires a start-of-window voice prompt and engages
  Studio Mode lighting. This is CC's dedicated pre-deep-work content block
  (09:00-11:00) — rationale in brain/SCHEDULE.md and memory/PATTERNS.md:
  shooting before deep work preserves shoot energy (LIFE_CANON #4 attention
  residue). Respects input_boolean.content_reminder_enabled for easy opt-out.
  Skips if content/studio mode is already running (they're already on it) or
  if guest_mode / away_mode is active. Adon-aware: prompt addresses whichever
  residents are home.

trigger:
  # 9:00 AM weekdays. Content block runs 09:00-11:00. To reconfigure, change
  # the `at` value AND update brain/SCHEDULE.md so agents stay in sync.
  - platform: time
    at: "09:00:00"

condition:
  # Weekdays only — content cadence is a work-week concept
  - condition: time
    weekday:
      - mon
      - tue
      - wed
      - thu
      - fri

  # The reminder toggle must be on — allows easy opt-out without disabling
  # the automation entirely
  - condition: state
    entity_id: input_boolean.content_reminder_enabled
    state: "on"

  # Both residents must be home — the prompt addresses them together
  - condition: state
    entity_id: person.conaugh
    state: "home"

  - condition: state
    entity_id: person.adon
    state: "home"

  # Skip if content mode is already active — they're already on it
  - condition: state
    entity_id: input_boolean.content_mode_active
    state: "off"

  # Skip if studio mode is already active — same reasoning
  - condition: state
    entity_id: input_boolean.studio_mode_active
    state: "off"

action:
  # 1. Auto-engage Studio Mode scene (lights + mic-friendly HVAC)
  - service: scene.turn_on
    target:
      entity_id: scene.studio_mode
    continue_on_error: true

  # 2. Mark studio_mode_active so downstream automations know we're in the block
  - service: input_boolean.turn_on
    target:
      entity_id: input_boolean.studio_mode_active
    continue_on_error: true

  # 3. Fire the voice prompt — start-of-window framing, not check-in framing.
  # The voice agent reads `message` and `context` to deliver a natural prompt.
  - service: rest_command.aura_webhook
    data:
      webhook_id: aura_voice_prompt
      payload: >
        {
          "message": "9 AM — content window is open, Studio Mode is live. You rolling?",
          "priority": "low",
          "context": {
            "reminder_type":       "content_window_start",
            "window_start":        "09:00",
            "window_end":          "11:00",
            "content_mode_active": "{{ states('input_boolean.content_mode_active') }}",
            "studio_mode_active":  "{{ states('input_boolean.studio_mode_active')  }}",
            "time_of_day":         "{{ now().strftime('%H:%M') }}",
            "day_of_week":         "{{ now().strftime('%A') }}",
            "canon":               "LIFE_CANON #4 — shoot before deep work"
          },
          "source": "scheduled_content_window_open"
        }
    continue_on_error: true

mode: single
max_exceeded: silent
