alias: "AURA - Scheduled: Daily Device Health Check (3 AM)"
description: >
  Fires every day at 3:00 AM — a quiet window with minimal household
  activity — and triggers a full system health check via the
  aura_device_health_check webhook. The webhook payload includes current
  entity states for every tracked device so the health-check handler can
  identify unresponsive or unexpected states. Results are logged as a
  persistent notification visible on the HA dashboard. Running at 3 AM
  avoids any interference with active automations.

trigger:
  - platform: time
    at: "03:00:00"

condition: []

action:
  # Step 1 — Fire the health check webhook with a full device state snapshot.
  # The health-check handler marks devices as OK / WARN / FAIL and writes
  # results to the aura_health_log sensor for the dashboard to display.
  - service: rest_command.aura_webhook
    data:
      webhook_id: aura_device_health_check
      payload: >
        {
          "check_time": "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}",
          "devices": {
            "lights": {
              "living_room_leds":  "{{ states('light.living_room_leds')  }}",
              "bedroom_leds":      "{{ states('light.bedroom_leds')      }}",
              "desk_accent":       "{{ states('light.desk_accent')       }}",
              "key_light":         "{{ states('light.key_light')         }}",
              "overhead":          "{{ states('light.overhead')          }}"
            },
            "switches": {
              "coffee_maker":  "{{ states('switch.coffee_maker')  }}",
              "air_purifier":  "{{ states('switch.air_purifier')  }}"
            },
            "climate": {
              "thermostat":    "{{ states('climate.thermostat')   }}"
            },
            "security": {
              "front_door_lock":    "{{ states('lock.front_door')           }}",
              "camera_front_door":  "{{ states('camera.front_door')         }}",
              "camera_living_room": "{{ states('camera.living_room')        }}"
            },
            "media": {
              "living_room_speaker": "{{ states('media_player.living_room_speaker') }}",
              "living_room_tv":      "{{ states('media_player.living_room_tv')      }}"
            },
            "presence": {
              "conaugh": "{{ states('person.conaugh') }}",
              "adon":    "{{ states('person.adon')    }}"
            }
          },
          "source": "scheduled_device_check"
        }
    continue_on_error: true

  # Step 2 — Write a persistent notification so the dashboard reflects that
  # the check ran, even before the webhook handler processes the results.
  - service: persistent_notification.create
    data:
      title: "AURA Device Health Check"
      message: >
        Health check initiated at {{ now().strftime('%Y-%m-%d %H:%M') }}.
        Results will appear once the aura_device_health_check handler
        completes processing.
      notification_id: "aura_device_health_check"
    continue_on_error: true

mode: single
max_exceeded: silent
