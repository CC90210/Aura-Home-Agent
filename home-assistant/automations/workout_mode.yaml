alias: "AURA - Workout Mode"
description: >
  Triggered by the aura_workout_mode webhook. Configures the apartment for home
  workouts. Maximum brightness at cool daylight 5000K — clinical, energising
  light that makes it easier to track form. High-energy playlist at 60% volume
  — motivating without being overwhelming in a living space. Thermostat drops
  to 19°C so the room stays cool during exercise. All mood/accent LEDs off so
  nothing competes with the functional lighting. Designed for Conaugh and Adon's
  home workout sessions.

trigger:
  - platform: webhook
    webhook_id: aura_workout_mode
    allowed_methods:
      - POST
    local_only: false

condition: []

action:
  # Overhead: max brightness at 5000K — energising and functional
  - service: light.turn_on
    target:
      entity_id: light.overhead
    data:
      color_temp_kelvin: 5000
      brightness_pct: 100
      transition: 2
    continue_on_error: true

  # Key light: 100% at 5000K — fills the workout area, useful for form checks
  - service: light.turn_on
    target:
      entity_id: light.key_light
    data:
      color_temp_kelvin: 5000
      brightness_pct: 100
      transition: 2
    continue_on_error: true

  # All accent and mood LEDs off — functional workout space, not a vibe space
  - service: light.turn_off
    target:
      entity_id:
        - light.living_room_leds
        - light.bedroom_leds
        - light.desk_accent
        - light.tv_backlight_leds
    data:
      transition: 2
    continue_on_error: true

  # Thermostat: 19°C — cooler room reduces overheating during exercise
  - service: climate.set_temperature
    target:
      entity_id: climate.thermostat
    data:
      temperature: 19
      hvac_mode: heat
    continue_on_error: true

  # Speaker: high-energy playlist at 60% volume
  - service: media_player.volume_set
    target:
      entity_id: media_player.living_room_speaker
    data:
      volume_level: 0.60
    continue_on_error: true

  - service: media_player.play_media
    target:
      entity_id: media_player.living_room_speaker
    data:
      # Replace with preferred high-energy / workout Spotify playlist URI
      media_content_id: "spotify:playlist:37i9dQZF1DX76Wlfdnj7AP"
      media_content_type: music
    continue_on_error: true

  # Mark workout mode active
  - service: input_boolean.turn_on
    target:
      entity_id: input_boolean.workout_mode_active
    continue_on_error: true

mode: single
max_exceeded: silent
