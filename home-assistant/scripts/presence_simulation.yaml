presence_simulation:
  alias: "Presence Simulation"
  description: >
    Randomly toggles lights to simulate presence when nobody is home. Runs for up to 4 hours.

    NOTE — STATIC VERSION (WILL BE REPLACED):
    This script uses random timing and fixed entity patterns. It is the safe
    fallback used until PhantomPresence 2.0 (voice-agent/phantom_presence.py)
    has accumulated at least 7 days of real usage data.

    Once the learning engine has enough history, PhantomPresence.generate_simulation_schedule()
    produces a dynamic schedule based on your actual light/switch patterns from
    the past week (with ±10 minute jitter so it's not machine-predictable).
    PhantomPresence.create_ha_script() then generates a replacement YAML for
    this file, which the away_mode automation writes to /config/scripts/ on the
    Pi and activates via script.reload — replacing this static version entirely.

    Until that threshold is reached, this static script remains active so
    away mode always has a working presence simulation from day one.
  mode: single
  sequence:
    - repeat:
        count: 8
        sequence:
          # Turn on a random light for 15-45 minutes
          - service: light.turn_on
            target:
              entity_id: light.living_room_leds
            data:
              brightness_pct: 40
              color_temp_kelvin: 3000
            continue_on_error: true

          - delay:
              minutes: "{{ range(15, 45) | random }}"

          - service: light.turn_off
            target:
              entity_id: light.living_room_leds
            continue_on_error: true

          # Brief pause, then toggle bedroom
          - delay:
              minutes: "{{ range(5, 15) | random }}"

          - service: light.turn_on
            target:
              entity_id: light.bedroom_leds
            data:
              brightness_pct: 30
              color_temp_kelvin: 2700
            continue_on_error: true

          - delay:
              minutes: "{{ range(10, 30) | random }}"

          - service: light.turn_off
            target:
              entity_id: light.bedroom_leds
            continue_on_error: true

    # Ensure all lights are off when simulation ends
    - service: light.turn_off
      target:
        entity_id:
          - light.living_room_leds
          - light.bedroom_leds
          - light.overhead
      continue_on_error: true
