# AURA Adaptive Learning Configuration
# All sensitive values (HA_URL, HA_TOKEN) come from the project .env file —
# never stored here.

database:
  # Relative path — resolved against the learning/ directory at runtime.
  # On the Pi this resolves to /path/to/aura/learning/data/patterns.db.
  # Do NOT use an absolute path here; it breaks dev machines on Windows/macOS.
  path: "data/patterns.db"

homeassistant:
  # Overridden by HA_URL environment variable at runtime
  url: "http://homeassistant.local:8123"

tracking:
  # Glob patterns for HA entity IDs to track. Uses fnmatch-style matching.
  entities:
    - "light.*"
    - "switch.*"
    - "climate.*"
    - "media_player.*"
    - "cover.*"
    - "lock.*"
    - "person.*"
    - "voice_agent.*"
    - "input_boolean.*"
    - "scene.*"

  # Minimum distinct-day samples before a learned pattern is trusted
  min_samples: 7

  # How often the evolution cycle runs (hours).  168 = one week.
  evolution_interval: 168

habits:
  # Weekday schedule: bed by midnight, wake at 7-8 AM
  # Weekend: flexible, no fixed schedule
  wake_target: "07:30"
  gym_window: "08:00-10:00"

  tracked_habits:
    - name: "wake_up_on_time"
      detection: "first_light_on_or_motion"
      target_time: "07:30"
      tolerance_minutes: 30

    - name: "gym"
      detection: "left_home_during_window"
      window: "08:00-10:00"

    - name: "deep_work"
      detection: "studio_mode_duration"
      min_duration_minutes: 60

    - name: "healthy_dinner"
      detection: "manual_log"
      reminder_time: "19:00"

    - name: "bedtime"
      detection: "goodnight_scene_activated"
      target_time: "00:00"
      tolerance_minutes: 30

    - name: "hydration"
      detection: "manual_log"
      daily_target: 8  # glasses
      reminder_times: ["10:00", "13:00", "16:00", "19:00"]

    - name: "mood_energy"
      detection: "manual_log"
      scale: 1-10  # "energy is 7" or "mood is low"
      log_times: ["09:00", "14:00", "20:00"]  # optional nudge times

    - name: "screen_break"
      detection: "no_motion_during_work"
      interval_minutes: 60  # remind to move every 60 min during deep work
      min_break_minutes: 5

  accountability:
    # Days of missed habit before AURA proactively mentions it
    nudge_threshold: 2
    # Tone: supportive but direct — matches AURA personality
    nudge_style: "homie"

  isolation:
    # CRITICAL: Each resident's data is fully isolated.
    # - CC never sees Adon's habits, streaks, or reports
    # - Adon never sees CC's habits, streaks, or reports
    # - AURA NEVER compares residents ("Adon went to the gym but you didn't")
    # - AURA NEVER mentions one resident's data to the other
    # - In guest mode, AURA mentions NO personal data at all
    enforce: true
    never_compare_residents: true
    never_share_cross_resident: true

persons:
  - id: conaugh
    display_name: "Conaugh"
    phone_entity: "person.conaugh"
  - id: adon
    display_name: "Adon"
    phone_entity: "person.adon"

fitness:
  # Fraction of activations kept (not overridden) that marks an automation
  # as healthy.  Below poor_fitness it is queued for mutation.
  good_fitness: 0.8
  poor_fitness: 0.4
  # Maximum fractional change applied to a numeric parameter in one generation
  mutation_rate: 0.1
