# AURA Voice Agent Configuration

wake_word:
  # Wake phrase: "Hey Aura"
  #
  # Uses OpenWakeWord with a custom-trained "Hey Aura" model.
  # Completely free, open source, runs locally on the Pi.
  #
  # To train the model (run on the Pi after setup):
  #   cd /config/aura/voice-agent
  #   python train_wake_word.py
  #   (Say "Hey Aura" ~16 times when prompted — takes 2 minutes)
  #
  # The script generates models/hey_aura.onnx which is loaded automatically.
  # Until trained, falls back to the built-in "hey_jarvis" model.
  engine: "openwakeword"
  model: "hey_aura"
  custom_model_path: "models/hey_aura.onnx"
  fallback_model: "hey_jarvis"
  phrase: "Hey Aura"

  # Confidence threshold (0.0 - 1.0).
  # Higher = fewer false activations but may miss quiet commands.
  # 0.6 is a good starting point.
  threshold: 0.6

audio:
  sample_rate: 16000
  chunk_size: 1280
  channels: 1
  format: paInt16

  # Recording settings — used by SpeechRecorder
  max_record_seconds: 30       # Max recording length (humans talk slowly, give them time)
  silence_threshold: 400       # RMS amplitude below which audio is "silence" (lower = more sensitive)
  silence_duration: 3.0        # Seconds of CONTINUOUS silence required to end recording
                               # People pause mid-sentence — 3s ensures we capture full thoughts
  min_speech_duration: 0.5     # Minimum speech before silence detection kicks in (prevents instant cutoff)
  end_of_turn_silence: 2.5     # After significant speech detected, wait this long before stopping
                               # Shorter than silence_duration because we know they started talking

  # Input device index for PyAudio.
  # Set to null for system default, or specify a device index.
  # IMPORTANT: If both clap detection and voice agent run simultaneously,
  # either use two separate USB mics (each with its own device index)
  # or configure ALSA dsnoop to share one mic. See docs/SETUP_GUIDE.md.
  input_device_index: null

stt:
  # Whisper model size: tiny, base, small, medium
  # "base" is the best balance of speed and accuracy on Pi 5 (8GB).
  # Use "tiny" if transcription is too slow; "small" for better accuracy
  # at the cost of ~2x CPU time.
  model: "base"
  language: "en"

tts:
  # ElevenLabs settings
  model: "eleven_turbo_v2_5"
  # voice_id is loaded from ELEVENLABS_VOICE_ID in .env — never set it here.

  # Audio output device index.
  # null = default system output device.
  # Set to an integer (e.g. 1) to route to a specific speaker.
  output_device: null

# ---------------------------------------------------------------------------
# Claude API — Tiered Model Configuration
# ---------------------------------------------------------------------------
# Two tiers keep costs low without sacrificing quality where it matters:
#
#   haiku  — Fast, cheap. Used for structured/routine tasks (intent parsing,
#            JSON extraction, playlist selection, mood classification).
#            ~10x cheaper than Sonnet. ~$2-5/month at normal usage.
#
#   sonnet — Smart, creative. Used for tasks requiring reasoning, synthesis,
#            or emotional intelligence (lighting design, weekly reports,
#            accountability conversations).
#
# All models use the same ANTHROPIC_API_KEY from .env — no extra setup.
# To force everything onto one tier (e.g., during testing), set both to
# the same model ID.
# ---------------------------------------------------------------------------
claude:
  # Tier definitions — model IDs
  models:
    haiku: "claude-haiku-4-5-20251001"
    sonnet: "claude-sonnet-4-6"

  # Per-module tier assignments.
  # Change any module from "haiku" to "sonnet" (or vice versa) to shift
  # its cost/quality tradeoff without touching Python code.
  tiers:
    intent_handler: "haiku"     # Structured JSON action parsing
    ghost_dj: "haiku"           # Playlist selection from a menu
    vibe_sync: "haiku"          # Track mood → lighting JSON
    content_radar: "haiku"      # Short nudge messages
    mirror_mode: "sonnet"       # Creative multi-light palette design
    energy_oracle: "sonnet"     # Weekly narrative briefing synthesis
    pulse_check: "sonnet"       # Conversational accountability

  # Legacy fallback — used if a module doesn't read tiers yet.
  model: "claude-haiku-4-5-20251001"
  max_tokens: 500
  temperature: 0.3

homeassistant:
  # Overridden at runtime by HA_URL and HA_TOKEN environment variables.
  url: "http://homeassistant.local:8123"

# ---------------------------------------------------------------------------
# Speakers — define once, every module reads from here.
# When you add, remove, or swap speakers, update ONLY this section.
# Python modules load these via config and never hardcode entity IDs.
# ---------------------------------------------------------------------------
speakers:
  # The primary speaker for music, announcements, and AURA voice.
  default: "media_player.living_room_speaker"

  # All speakers in the apartment, keyed by room.
  rooms:
    living_room: "media_player.living_room_speaker"
    bedroom: "media_player.bedroom_speaker"
    studio: "media_player.studio_speaker"

# Known protocols AURA can execute.
# These are described to Claude so it understands the scope of each scene.
protocols:
  close_down:
    description: "Shut everything down for the night"
    actions:
      - "Turn off all lights (fade over 30 seconds)"
      - "Set thermostat to 18C"
      - "Close blinds"
      - "Lock front door"
      - "Stop all music"
      - "Arm cameras"

  open_up:
    description: "Morning startup routine"
    actions:
      - "Open blinds"
      - "Lights to warm white at 60%"
      - "Set thermostat to 21C"
      - "Start morning playlist"

  studio_mode:
    description: "Content creation lighting"
    actions:
      - "Key light to 100% daylight"
      - "Desk accent LEDs blue at 60%"
      - "Dim overheads to 20%"

  movie_mode:
    description: "Movie watching ambiance"
    actions:
      - "All lights deep purple at 5%"
      - "Close blinds"

  party_mode:
    description: "Party lighting and music"
    actions:
      - "LEDs to color cycle effect"
      - "Speakers to 75% volume"
      - "Overheads off"

  focus_mode:
    description: "Deep work environment"
    actions:
      - "Cool daylight at 80%"
      - "Lo-fi playlist at low volume"

  guest_mode:
    description: "Comfortable settings for guests"
    actions:
      - "Neutral warm lighting"
      - "Comfortable temperature (21C)"

  away_mode:
    description: "Security mode when nobody is home"
    actions:
      - "All lights off"
      - "Thermostat to eco mode"
      - "Arm cameras"
      - "Random light simulation"

# ---------------------------------------------------------------------------
# Security
# ---------------------------------------------------------------------------
# Controls which voice commands require PIN verification and which are
# blocked from voice control entirely.
#
# voice_pin: A 4-6 digit PIN spoken aloud to authorize sensitive actions.
#   The PIN is stored as a SHA-256 hash in memory — the raw value here is
#   read at startup and immediately discarded after hashing.
#
#   IMPORTANT: Set AURA_VOICE_PIN in .env (recommended) or replace CHANGE_ME
#   here before going live.
#   To generate a good PIN, use any random 4-6 digit number.
#   Do not reuse a PIN you use for banking or other security systems.
#
# sensitive_actions: These require PIN confirmation before execution.
#   Add or remove entries using "domain.service" format.
#
# blocked_actions: These CANNOT be triggered via voice under any circumstances.
#   They must be performed through the HA web UI or physical access.
#
security:
  voice_pin: "CHANGE_ME"

  sensitive_actions:
    - lock.unlock
    - lock.lock
    - lock.open
    - alarm_control_panel.alarm_disarm
    - alarm_control_panel.alarm_arm_away
    - alarm_control_panel.alarm_arm_home
    - camera.disable_motion_detection
    - cover.open_cover

  blocked_actions:
    - homeassistant.stop
    - homeassistant.restart
    - hassio.host_shutdown
    - hassio.host_reboot
    - hassio.addon_stop
    - hassio.addon_restart
